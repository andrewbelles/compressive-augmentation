device: auto
seed: 17
use_low_rank: false
dataset: fma_small_mel

sensing_pair: dct_dct

augmentations: [a1]
ratios: [80, 90]
projection_dims: [256]
embedding_dims: [256]
cs_prob: 1.0
symmetric: false

base_channels: 32
dropout: 0.0
projection_hidden_dim: 1024
batch_size: 256
num_workers: 8
epochs: 300
learning_rate: 1.0e-4
weight_decay: 1.0e-4
warmup_epochs: 20
gl2_strip: 5
gl5_threshold: 3.0
gl5_strip: 5
gl5_grace: 50
up_k_min: 5.0
up_k_strip: 10
barlow_lambda: 0.005

augment:
  crop_frames: 256
  resize_scale: [0.85, 1.0]
  linear_fader_strength: 0.15
  time_mask_width: 24
  freq_mask_width: 8
