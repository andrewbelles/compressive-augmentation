device: auto
seed: 0
use_low_rank: false
dataset: fma_small_mel

sensing_pair: patch_dct

augmentations: [a3, a4]
ratios: [10, 20]

projection_dims: [256]
embedding_dims: [256]
cs_prob: 1.0
symmetric: false
force_retrain: false

base_channels: 32
dropout: 0.0
projection_hidden_dim: 1024
batch_size: 256
num_workers: 8
epochs: 300
learning_rate: 1.0e-4
weight_decay: 1.0e-4
warmup_epochs: 20
gl2_strip: 5
gl5_threshold: 3.0
gl5_strip: 5
gl5_grace: 30
up_k_min: 5.0
up_k_strip: 10
barlow_lambda: 0.005

augment:
  crop_frames: 256
  resize_scale: [0.6, 1.0]
  linear_fader_strength: 0.25
  time_mask_width: 48
  freq_mask_width: 16
  noise_std: 0.05
  patch_f: 16
  patch_t: 16
