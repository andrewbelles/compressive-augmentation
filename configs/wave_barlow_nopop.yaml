device: auto
seed: 0
dataset: fma_small
sample_rate: 22050
segment_seconds: 5.0
full_track_seconds: 30.0

mode: cs
embedding_dims: [256]
ratios: [10, 20, 30, 40]
policies: [w3, w4]
exclude_genres: [Pop]

n_fft: 1024
hop_length: 256
n_mels: 128
base_channels: 16
n_blocks: 3
projection_hidden_dim: 4096
projection_dim: 2048

batch_size: 256
num_workers: 8
epochs: 300
learning_rate: 1.2e-3
weight_decay: 1.0e-4
warmup_epochs: 20
gl2_strip: 4
gl5_threshold: 2.0
gl5_strip: 5
gl5_grace: 30
up_k_min: 5.0
up_k_strip: 10
barlow_lambda: 5.0e-5
force_retrain: false

wave_augment:
  wave_stretch_scale: [0.8, 1.2]
  wave_gain_strength: 0.25
  wave_n_masks: 2
  wave_mask_width: 4410
  wave_noise_std: 0.005
