dataset: fma_small_mel
mel_dir: preprocess/data/fma_small_mel
output_dir: compression/data
mel_bins: 64
mel_frames: 128
ratios: [1, 2, 4, 8, 12, 16, 24, 50]
methods:
  - gaussian_random 
  - sfrt
  - shrt_cqt
  - dct_random
  - patch_dictionary
n_eval_samples: 256
seed: 0
cosamp_sparsity: 128
cosamp_iters: 20
eval_experiments:
  - psnr
  - linear_probe
  - patch_predict
  - intrinsic_dim
cqt:
  sample_rate: 22050
  fmin: 32.7
  n_bins: 84
  bins_per_octave: 12
  hop_length: 512
  n_frames: 128
dictionary:
  n_components: 128
  max_iter: 500
